<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Dhika's Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="Gameframe">
    <div class="character">
      <span></span>
    </div>
  </section>
  <div class="mousetrackpad"></div>
  <div class="projectiles">
    <span class="user-bullets"></span>
    <span class="enemy-bullets"></span>
  </div>
  <div class="data">
    <div class="userhearts"></div>
    <div class="enemyhealth"></div>
  </div>
<div id="bossbar" style="display:none;">
  <div id="bossbar-name"></div>
  <div id="bossbar-track">
    <div id="bossbar-fill"></div>
  </div>
  <div id="bossbar-phase"></div>
</div>

  <script src="layout.js"></script>
  <script src="script.js"></script>
</body>
</html>
